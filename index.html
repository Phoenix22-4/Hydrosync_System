<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HydroSync</title>
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="theme-color" content="#06b6d4" />
    <script>
      // Admin is the ONLY PWA.
      // - Install entry: /setup_adminhydro
      // - Admin routes: /admin/*
      (function () {
        var path = window.location.pathname || '/';
        var isAdmin = path.startsWith('/setup_adminhydro') || path.startsWith('/admin');
        if (!isAdmin) return;

        // Add admin manifest
        var manifestEl = document.createElement('link');
        manifestEl.setAttribute('rel', 'manifest');
        manifestEl.setAttribute('href', '/manifest-admin.webmanifest');
        document.head.appendChild(manifestEl);

        // Register service worker (generated by vite-plugin-pwa) only for admin.
        var swScript = document.createElement('script');
        swScript.setAttribute('type', 'module');
        swScript.setAttribute('src', '/registerSW.js');
        document.head.appendChild(swScript);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
