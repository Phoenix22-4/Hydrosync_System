<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HydroSync</title>
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="theme-color" content="#06b6d4" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.firebaseapp.com https://*.googleapis.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' wss: https: https://*.firebaseio.com https://*.googleapis.com; frame-src 'self' https://*.firebaseapp.com https://*.google.com; font-src 'self'; media-src 'self'; object-src 'none'; worker-src 'self' blob:; base-uri 'self'; form-action 'self';">
    <script>
      // Admin is the ONLY PWA.
      // - Install entry: /setup_adminhydro
      // - Admin routes: /admin/*
      (function () {
        var path = window.location.pathname || '/';
        var isAdmin = path.startsWith('/setup_adminhydro') || path.startsWith('/admin');
        if (!isAdmin) return;

        // Add admin manifest
        var manifestEl = document.createElement('link');
        manifestEl.setAttribute('rel', 'manifest');
        manifestEl.setAttribute('href', '/manifest-admin.webmanifest');
        document.head.appendChild(manifestEl);

        // Register service worker (generated by vite-plugin-pwa) only for admin.
        // We register the generated `/sw.js` directly to avoid missing `/registerSW.js`
        // on static hosts (which would otherwise return HTML and trigger MIME errors).
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('/sw.js').catch(function (err) {
              console.warn('SW registration failed:', err);
            });
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
